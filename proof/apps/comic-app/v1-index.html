<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Comic Studio — Page Renderer</title>
<style><!-- include: app.css --></style>
</head>
<body>
<main class="app">
  <header class="app-head">
    <h1 id="app-title">COMIC STUDIO</h1>
    <p id="app-tagline">Define your style, characters, and panels — then render the page.</p>
    <div id="app-auth" class="auth"></div>
  </header>

  <section id="app-inputs" class="inputs"></section>

  <div class="run-row">
    <button id="app-run" class="run">⚡ RENDER PAGE</button>
    <label id="app-loop" class="loop"></label>
    <div id="app-count" class="count"></div>
  </div>

  <div id="app-status" class="status"></div>

  <section id="app-output" class="output"></section>
</main>

<!-- include-config: graph.json -->
<!-- include: runtime.js -->
<script>NoodleApp.mount();</script>
</body>
</html>
