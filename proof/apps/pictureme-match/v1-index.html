<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Picture Me As…</title>
<style><!-- include: app.css --></style>
</head>
<body>
<main class="app">
  <header class="app-head">
    <h1 id="app-title">Picture Me As…</h1>
    <p id="app-tagline">Upload a portrait, describe a look, and watch yourself transformed — film-noir, anime, and one blended masterpiece.</p>
    <div id="app-auth" class="auth"></div>
  </header>

  <section id="app-inputs" class="inputs" data-labels='{"image":"Drop your photo","text":"Describe your look","system":"Style-merge instructions (optional)"}'></section>

  <div class="run-row">
    <button id="app-run" class="run">✨ Transform</button>
    <label id="app-loop" class="loop"></label>
    <div id="app-count" class="count"></div>
  </div>

  <div id="app-status" class="status" data-helper="Each pass keeps your identity and pose — only the style changes."></div>

  <section id="app-output" class="output"></section>
  <footer class="made-with">Made with NanoGPT</footer>
</main>

<!-- include-config: graph.json -->
<!-- include: runtime.js -->
<script>NoodleApp.mount();</script>
</body>
</html>
