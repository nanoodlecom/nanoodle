/* ======================================================================
   GRAPH STATE
   ====================================================================== */
let graph = { nodes:[], links:[] };   // node:{id,type,x,y,fields,el,out}  link:{id,from:{node,port},to:{node,port}}
let nid = 1, lid = 1;
let selected = null;
const byId = (id)=> graph.nodes.find(n=>n.id===id);

/* ---------- view transform ---------- */
let panX = 40, panY = 30, scale = 1;
const world = $("world"), editor = $("editor"), svg = $("wires");
function applyWorld(){ world.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`; }

/* ======================================================================
   NODE CREATION / RENDERING
   ====================================================================== */
function addNode(type, x, y, fields){
  const t = NODE_TYPES[type];
  const n = { id:"n"+(nid++), type, x, y, fields:Object.assign({}, fields), out:{}, el:null };
  if(t.modelKind && !n.fields.model) n.fields.model = defModelFor(type);
  graph.nodes.push(n);
  buildNodeEl(n);
  save();
  return n;
}

function buildNodeEl(n){
  const t = NODE_TYPES[n.type];
  const el = document.createElement("div");
  el.className = "node"; el.dataset.id = n.id; el.dataset.status = "idle";
  el.style.left = n.x+"px"; el.style.top = n.y+"px";
  if(n.w){ el.style.width = n.w+"px"; el.style.maxWidth = "none"; }   // restore a horizontally-stretched card
  const inRows  = t.inputs.map(p=>`<div class="prow"><i class="port ${p.type}" data-node="${n.id}" data-port="${p.name}" data-dir="in" data-ptype="${p.type}"></i><span>${p.name}</span></div>`).join("");
  const outRows = t.outputs.map(p=>`<div class="prow"><i class="port ${p.type}" data-node="${n.id}" data-port="${p.name}" data-dir="out" data-ptype="${p.type}"></i><span>${p.name}</span></div>`).join("");
  el.innerHTML = `
    <header class="t-${n.type}">
      <span class="em">${t.em}</span><span class="ttl">${t.title}</span>
      <span class="dot"></span>
      <button class="hbtn" data-act="run" title="run this branch">▶</button>
      <button class="hbtn" data-act="del" title="delete">✕</button>
    </header>
    <div class="ports">
      <div class="col in">${inRows}</div>
      <div class="col out">${outRows}</div>
    </div>
    <div class="body">${t.body(n)}<div class="result"></div></div>`;
  world.appendChild(el);
  n.el = el;

  // field bindings
  el.querySelectorAll("[data-f]").forEach(inp=>{
    const f = inp.dataset.f;
    const ev = inp.tagName==="SELECT" ? "change" : "input";
    inp.addEventListener(ev, ()=>{ n.fields[f] = inp.value; save(); });
    inp.addEventListener("pointerdown", e=>e.stopPropagation()); // don't drag node when editing
  });
  // model picker button
  const mp = el.querySelector(".modelpick");
  if(mp){
    mp.addEventListener("pointerdown", e=>e.stopPropagation());
    mp.onclick = (e)=>{
      e.stopPropagation();
      openPicker(t.modelKind, { current:n.fields.model, filter:t.modelFilter, onPick:(id)=>{
        n.fields.model = id; mp.textContent = id+" ▾"; updateNodePrice(n); refreshAudioParams(n); refreshImageInputs(n); save();
      }});
    };
    updateNodePrice(n);
  }
  refreshAudioParams(n);
  if(t.mount) t.mount(n);            // node-specific widget wiring (e.g. upload/webcam)
  // header buttons
  el.querySelector('[data-act=del]').onclick = (e)=>{ e.stopPropagation(); removeNode(n.id); };
  el.querySelector('[data-act=run]').onclick  = (e)=>{ e.stopPropagation(); runGroup([n.id]); };
  // selection + drag
  const header = el.querySelector("header");
  header.addEventListener("pointerdown", e=>{
    if(e.target.closest(".hbtn")) return;
    select(n); startNodeDrag(n, e);
  });
  el.addEventListener("pointerdown", ()=> select(n));
  // ports
  el.querySelectorAll(".port").forEach(p=> p.addEventListener("pointerdown", e=>startWire(p, e)));
  refreshImageInputs(n);             // dynamic image ports + their own wire listeners (after the static-port bind above)
  addFieldPorts(n);
  refreshPortFills();
  prepTextareas(n);
}

// Keep a node's image ports contiguous (img1, img2, …) after one is unwired — without this,
// removing the source of a middle port (img2) leaves a hole. Renumbers the surviving image
// links in place, preserving order. Safe no-op for nodes without image inputs.
function recompactImageLinks(n){
  if(!n || !NODE_TYPES[n.type]?.imageInputs) return;
  graph.links.filter(l=> l.to.node===n.id && IMG_PORT_RE.test(l.to.port))
    .sort((a,b)=> (+a.to.port.slice(3)) - (+b.to.port.slice(3)))
    .forEach((l,i)=>{ l.to.port = "img"+(i+1); });
}

// Render a node's dynamic image input ports (vision-capable chat). Idempotent: rebuilds the
// rows from the current model + wiring, so it's safe to re-run after a model pick, connect,
// disconnect, or graph load. A disabled stub can't be wired (startWire bails on .disabled).
function refreshImageInputs(n){
  if(!n.el || !NODE_TYPES[n.type].imageInputs) return;
  const col = n.el.querySelector(".col.in"); if(!col) return;
  col.querySelectorAll(".prow.imgrow").forEach(el=> el.remove());
  const defs = imageInputDefs(n), multi = defs.length>1;
  defs.forEach((d,i)=>{
    const row = document.createElement("div");
    row.className = "prow imgrow" + (d.disabled?" off":"");
    row.innerHTML = `<i class="port image${d.disabled?" disabled":""}" data-node="${n.id}" data-port="${d.name}" data-dir="in" data-ptype="image"`
      + (d.disabled?` title="this model can’t read images — pick a vision model"`:``) + `></i>`
      + `<span>${multi?("image "+(i+1)):"image"}</span>`;
    col.appendChild(row);
    if(!d.disabled) row.querySelector(".port").addEventListener("pointerdown", e=> startWire(e.currentTarget, e));
  });
  refreshPortFills();
}

// Give every text field an inline input port: wiring it makes the node use the wired
// value instead of whatever's typed. Idempotent — safe to re-run after the body rebuilds.
function addFieldPorts(n){
  if(!n.el || n.type==="text") return;        // Text is a pure source — nothing to override
  n.el.querySelectorAll("textarea[data-f], textarea[data-pf]").forEach(ta=>{
    const field = ta.dataset.f || ta.dataset.pf;
    if(field==="extraJson") return;            // advanced JSON isn't a wirable text value
    const wrap = ta.parentElement;
    if(!wrap || wrap.querySelector(":scope > .fieldport")) return;   // already has its port
    wrap.style.position = "relative";
    const port = document.createElement("i");
    port.className = "port text fieldport";
    Object.assign(port.dataset, { node:n.id, port:field, dir:"in", ptype:"text" });
    port.addEventListener("pointerdown", e=> startWire(port, e));
    wrap.insertBefore(port, wrap.firstChild);
  });
}

// Let prompt textareas stretch both ways. Dragging the corner grip wider grows the whole
// node card (so results + sibling fields stay aligned and nothing overflows); height is
// remembered per field. Both persist so a stretched layout survives reload/share.
// We only react while the user is actively dragging the grip — never to layout reflow
// (e.g. a result rendering) that merely changes a width:100% textarea's measured size.
const GRIP = 18, _taSeen = new WeakSet();
let _resizingTA = null, _nodeRO = null;
function applyResize(ta){
  const el = ta.closest(".node"); if(!el) return;
  const n = byId(el.dataset.id); if(!n) return;
  const w = ta.offsetWidth, h = ta.offsetHeight, start = ta._rs || {}, chrome = n._chrome ?? 21;
  if(w !== start.w){ el.style.maxWidth = "none"; el.style.width = (n.w = w + chrome) + "px"; }  // wider → grow the card
  if(h !== start.h){ (n.sizes ||= {})[ta.dataset.f || ta.dataset.pf] = h; }                        // taller → remember the field
  redraw(); save();
}
function nodeRO(){
  if(_nodeRO) return _nodeRO;
  _nodeRO = new ResizeObserver(es=>{ for(const e of es) if(e.target === _resizingTA) applyResize(e.target); });
  return _nodeRO;
}
function prepTextareas(n){
  if(!n.el) return;
  n.el.querySelectorAll("textarea[data-f],textarea[data-pf]").forEach(ta=>{
    const field = ta.dataset.f || ta.dataset.pf;
    if(n.sizes && n.sizes[field] && !ta.style.height) ta.style.height = n.sizes[field]+"px";
    // measure node padding+borders now, while the textarea still fills the card (before any grip drag)
    if(n._chrome==null && n.el.offsetWidth>0 && ta.offsetWidth>0) n._chrome = Math.round(n.el.offsetWidth - ta.offsetWidth);
    if(_taSeen.has(ta)) return;
    _taSeen.add(ta);
    ta.addEventListener("pointerdown", e=>{                  // a gesture starting on the bottom-right grip is a resize
      const r = ta.getBoundingClientRect();
      if(e.clientX >= r.right - GRIP && e.clientY >= r.bottom - GRIP){ ta._rs = {w:ta.offsetWidth, h:ta.offsetHeight}; _resizingTA = ta; }
    });
    nodeRO().observe(ta);
  });
}
addEventListener("pointerup", ()=>{ if(_resizingTA){ applyResize(_resizingTA); _resizingTA = null; } });  // commit the final size

// downscale an <img>/<video> source to a JPEG data URL (keeps localStorage/share payloads small)
function scaledDataURL(src, sw, sh, max=1024){
  let w=sw, h=sh;
  if(Math.max(w,h) > max){ const r = max/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
  const c = document.createElement("canvas"); c.width=w; c.height=h;
  c.getContext("2d").drawImage(src, 0, 0, w, h);
  return c.toDataURL("image/jpeg", 0.9);
}
function fileToDataURL(file, cb){
  const img = new Image();
  img.onload = ()=> cb(scaledDataURL(img, img.naturalWidth, img.naturalHeight));
  img.onerror = ()=> flash("couldn’t read that image");
  const fr = new FileReader(); fr.onload = ()=> img.src = fr.result; fr.readAsDataURL(file);
}
// wire up the Image-input node: file upload + live webcam capture, stored as n.fields.image
function mountUpload(n){
  const el = n.el;
  const prev = el.querySelector("[data-uprev]");
  const fileInput = el.querySelector("[data-upfile]");
  const cambox = el.querySelector("[data-cambox]");
  const video = el.querySelector("[data-upvid]");
  let stream = null;
  const setImage = (url)=>{ n.fields.image = url; prev.innerHTML = `<img src="${esc(url)}" alt="image"/>`; save(); };
  const stopCam = ()=>{ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } if(video) video.srcObject=null; cambox.hidden=true; };
  n._stopCam = stopCam;                                    // so removeNode can release the camera
  el.querySelectorAll("[data-up]").forEach(b=>{
    b.addEventListener("pointerdown", e=> e.stopPropagation());   // don't start a node drag
    b.onclick = async (e)=>{
      e.stopPropagation();
      const act = b.dataset.up;
      if(act==="file") fileInput.click();
      else if(act==="cam"){
        try{ stream = await navigator.mediaDevices.getUserMedia({video:true}); video.srcObject=stream; cambox.hidden=false; }
        catch(err){ flash("webcam unavailable: "+err.message); }
      }
      else if(act==="snap"){ if(video.videoWidth){ setImage(scaledDataURL(video, video.videoWidth, video.videoHeight)); } stopCam(); }
      else if(act==="stop") stopCam();
    };
  });
  fileInput.addEventListener("change", ()=>{ const f=fileInput.files?.[0]; if(f) fileToDataURL(f, setImage); fileInput.value=""; });
}

// Audio/Video input nodes: read a chosen file straight to a data URL (no scaling — bytes are
// kept as-is) and store it on the node field. Clips are inlined when they feed a model, so the
// ≤4 MB limit applies downstream; warn early when a file is over it.
function mountFileUpload(n, field){
  const el = n.el;
  const prev = el.querySelector("[data-uprev]");
  const fileInput = el.querySelector("[data-upfile]");
  const tag = field==="video" ? "video" : "audio";
  const setMedia = (url)=>{ n.fields[field] = url; prev.innerHTML = `<${tag} src="${esc(url)}" controls${tag==="video"?" playsinline":""}></${tag}>`; save(); };
  el.querySelectorAll("[data-up]").forEach(b=>{
    b.addEventListener("pointerdown", e=> e.stopPropagation());        // don't start a node drag
    b.onclick = (e)=>{ e.stopPropagation(); if(b.dataset.up==="file") fileInput.click(); };
  });
  fileInput.addEventListener("change", ()=>{
    const f = fileInput.files?.[0];
    if(f){
      if(f.size > MEDIA_INLINE_MAX) flash(`that ${field} is ~${(f.size/1048576).toFixed(1)} MB — over the 4 MB send limit; use a shorter clip or it won’t reach the model`);
      const fr = new FileReader();
      fr.onload = ()=> setMedia(fr.result);
      fr.onerror = ()=> flash("couldn’t read that file");
      fr.readAsDataURL(f);
    }
    fileInput.value="";
  });
}

function removeNode(id){
  // downstream image inputs this node feeds — they must recompact so no hole is left behind
  const affected = [...new Set(graph.links
    .filter(l=> l.from.node===id && IMG_PORT_RE.test(l.to.port)).map(l=> l.to.node))];
  graph.links = graph.links.filter(l=> l.from.node!==id && l.to.node!==id);
  const n = byId(id); n?._stopCam?.();           // release the webcam if this was an Image-input node
  if(n?.el) n.el.remove();
  graph.nodes = graph.nodes.filter(x=>x.id!==id);
  if(selected===n) selected=null;
  for(const aid of affected){ const an = byId(aid); if(an){ recompactImageLinks(an); refreshImageInputs(an); } }
  refreshPortFills();   // a textarea fed by the removed node is now unwired — unlock it (don't leave it disabled)
  redraw(); save();
}

function select(n){
  if(selected===n) return;
  if(selected?.el) selected.el.classList.remove("sel");
  selected = n;
  if(n?.el) n.el.classList.add("sel");
}

function setStatus(n, status, msg){
  if(!n?.el) return;
  n.el.dataset.status = status;
  if(status==="run"){
    const r = n.el.querySelector(".result");
    r.classList.add("show"); r.innerHTML = `<span class="spin"></span> running…`;
  }
  if(status==="error"){
    const r = n.el.querySelector(".result");
    r.classList.add("show"); r.innerHTML = `<div class="err">⚠ ${esc(msg||"error")}</div>`;
  }
}

function setNodeProgress(n, msg){
  if(!n.el) return;
  const r = n.el.querySelector(".result");
  r.classList.add("show"); r.innerHTML = `<span class="spin"></span> ${esc(msg)}`;
}
function openUrl(url){ window.open(url, "_blank", "noopener"); }
async function downloadUrl(url, filename){
  try{
    let href = url;
    if(!/^(data:|blob:)/.test(url)){                    // remote URL → fetch the bytes so download works cross-origin
      const b = await (await fetch(url)).blob();
      href = URL.createObjectURL(b);
    }
    const a = document.createElement("a"); a.href=href; a.download=filename; a.click();
    if(href!==url) setTimeout(()=> URL.revokeObjectURL(href), 4000);
  }catch{ openUrl(url); }                                // fallback: open in a new tab
}
function showResult(n){
  const t = NODE_TYPES[n.type], r = n.el.querySelector(".result");
  if(t.preview==="none"){ r.classList.remove("show"); r.innerHTML=""; return; }
  r.classList.add("show");
  if(t.preview==="image" && n.out.image){
    r.innerHTML = `<img src="${esc(n.out.image)}" alt="output"/><div class="acts"><button data-dl>⬇ save</button></div>`;
    r.querySelector("[data-dl]").onclick = ()=> downloadUrl(n.out.image, `noodle-${n.id}.png`);
  } else if(t.preview==="video" && n.out.video){
    r.innerHTML = `<video src="${esc(n.out.video)}" controls loop muted playsinline></video><div class="acts"><button data-dl>⬇ save</button><button data-open>↗ open</button></div>`;
    r.querySelector("[data-dl]").onclick   = ()=> downloadUrl(n.out.video, `noodle-${n.id}.mp4`);
    r.querySelector("[data-open]").onclick = ()=> openUrl(n.out.video);
  } else if(t.preview==="audio" && n.out.audio){
    const ext = (n.fields.response_format || "mp3").toLowerCase();
    r.innerHTML = `<audio src="${esc(n.out.audio)}" controls></audio><div class="acts"><button data-dl>⬇ save</button><button data-open>↗ open</button></div>`;
    r.querySelector("[data-dl]").onclick   = ()=> downloadUrl(n.out.audio, `noodle-${n.id}.${ext}`);
    r.querySelector("[data-open]").onclick = ()=> openUrl(n.out.audio);
  } else {
    r.innerHTML = `<div class="rtext">${esc(n.out.text ?? "")}</div><div class="acts"><button data-copy>⧉ copy</button></div>`;
    r.querySelector("[data-copy]").onclick = async (e)=>{
      const b=e.currentTarget, o=b.textContent;
      b.textContent = await copyText(n.out.text ?? "") ? "✓ copied" : "copy failed";
      setTimeout(()=> b.textContent=o, 1200);
    };
  }
}

/* ======================================================================
   WIRES  (drawn in screen space from live port positions)
   ====================================================================== */
function portCenter(el){
  const r = el.getBoundingClientRect(), e = editor.getBoundingClientRect();
  return { x: r.left + r.width/2 - e.left, y: r.top + r.height/2 - e.top };
}
function wirePath(x1,y1,x2,y2){
  const dx = Math.max(40, Math.abs(x2-x1)*0.5);
  return `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;
}
function colorForType(tp){ return tp==="image" ? getCss("--image-port") : getCss("--text-port"); }
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

let tempWire = null; // {x1,y1,type}
function redraw(){
  let html = "";
  for(const l of graph.links){
    const a = document.querySelector(`.port[data-node="${l.from.node}"][data-port="${l.from.port}"][data-dir="out"]`);
    const b = document.querySelector(`.port[data-node="${l.to.node}"][data-port="${l.to.port}"][data-dir="in"]`);
    if(!a||!b) continue;
    const p1 = portCenter(a), p2 = portCenter(b);
    const d = wirePath(p1.x,p1.y,p2.x,p2.y);
    const col = colorForType(a.dataset.ptype);
    html += `<path class="hit" data-link="${l.id}" d="${d}"></path>`;
    html += `<path class="wire" data-link="${l.id}" d="${d}" stroke="${col}"></path>`;
  }
  if(tempWire){
    const d = wirePath(tempWire.x1, tempWire.y1, tempWire.x2, tempWire.y2);
    html += `<path class="temp" d="${d}"></path>`;
  }
  svg.innerHTML = html;
  svg.querySelectorAll("path[data-link]").forEach(p=>{
    p.addEventListener("click", e=>{ e.stopPropagation(); removeLink(p.dataset.link); });
  });
}
function removeLink(id){
  const l = graph.links.find(x=>x.id===id);
  graph.links = graph.links.filter(x=>x.id!==id);
  const tn = l && byId(l.to.node);
  if(tn){ recompactImageLinks(tn); refreshImageInputs(tn); }   // close any hole, rebuild ports first…
  redraw(); refreshPortFills();                                // …then draw wires to the new ports
  save();
}
function refreshPortFills(){
  document.querySelectorAll(".port").forEach(p=> p.classList.remove("filled"));
  document.querySelectorAll("textarea.wired").forEach(ta=>{ ta.classList.remove("wired"); ta.disabled=false; });
  for(const l of graph.links){
    document.querySelector(`.port[data-node="${l.to.node}"][data-port="${l.to.port}"][data-dir="in"]`)?.classList.add("filled");
    document.querySelector(`.port[data-node="${l.from.node}"][data-port="${l.from.port}"][data-dir="out"]`)?.classList.add("filled");
    // a wired text field is driven by the connection — lock its textarea
    const fp = document.querySelector(`.fieldport[data-node="${l.to.node}"][data-port="${l.to.port}"]`);
    const ta = fp?.parentElement.querySelector("textarea[data-f],textarea[data-pf]");
    if(ta){ ta.classList.add("wired"); ta.disabled=true; }
  }
}

/* ======================================================================
   POINTER INTERACTIONS  (node drag · pan · zoom · wire connect)
   ====================================================================== */
function startNodeDrag(n, e){
  e.preventDefault();
  const sx=e.clientX, sy=e.clientY, ox=n.x, oy=n.y;
  const move = (ev)=>{
    n.x = ox + (ev.clientX-sx)/scale;
    n.y = oy + (ev.clientY-sy)/scale;
    n.el.style.left = n.x+"px"; n.el.style.top = n.y+"px";
    redraw();
  };
  const up = ()=>{ window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); save(); };
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
}

const MAG = 80; // snap radius (px, screen space) — lets people aim loosely
function compatiblePorts(dir, ptype, skipNode){
  return [...document.querySelectorAll(".port")].filter(p=>
    p.dataset.dir!==dir && p.dataset.ptype===ptype && p.dataset.node!==skipNode && !p.classList.contains("disabled"));
}
function nearestPort(x, y, ports){
  let best=null, bd=MAG*MAG;
  for(const p of ports){ const c=portCenter(p); const d=(c.x-x)**2+(c.y-y)**2; if(d<bd){ bd=d; best={p,c}; } }
  return best;
}
function startWire(port, e){
  e.preventDefault(); e.stopPropagation();
  closeQuickAdd();
  const dir = port.dataset.dir, ptype = port.dataset.ptype, node = port.dataset.node;
  const sx = e.clientX, sy = e.clientY;             // where the drag began — used to tell a click from a drag
  const fixed = portCenter(port);
  const targets = compatiblePorts(dir, ptype, node);
  targets.forEach(p=> p.classList.add("compatible"));   // glow every valid destination, by type
  tempWire = { x1:fixed.x, y1:fixed.y, x2:fixed.x, y2:fixed.y };
  let snap = null;
  const move = (ev)=>{
    const ed = editor.getBoundingClientRect();
    let mx = ev.clientX-ed.left, my = ev.clientY-ed.top;
    if(snap) snap.p.classList.remove("snap");
    snap = nearestPort(mx, my, targets);             // magnetism: pull toward the closest compatible port
    if(snap){ snap.p.classList.add("snap"); mx = snap.c.x; my = snap.c.y; }
    tempWire.x2 = mx; tempWire.y2 = my;
    redraw();
  };
  const up = (ev)=>{
    window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up);
    tempWire = null;
    targets.forEach(p=> p.classList.remove("compatible","snap"));
    let other = snap?.p;                              // prefer the magnetically-snapped port
    if(!other){ const tgt = document.elementFromPoint(ev.clientX, ev.clientY); other = tgt && tgt.closest(".port"); }
    let connected = false;
    if(other && other!==port){
      const odir = other.dataset.dir, otype = other.dataset.ptype;
      if(odir!==dir && otype===ptype && !other.classList.contains("disabled")){
        const out = dir==="out" ? port : other;
        const inn = dir==="in"  ? port : other;
        connect(out.dataset.node, out.dataset.port, inn.dataset.node, inn.dataset.port);
        connected = true;
      }
    }
    redraw();
    // dropped a wire into empty canvas → offer to create a node that fits this port, right here
    if(!connected && Math.hypot(ev.clientX-sx, ev.clientY-sy) > 6){
      const tgt = document.elementFromPoint(ev.clientX, ev.clientY);
      if(!tgt || !tgt.closest(".node")) openQuickAdd(ev.clientX, ev.clientY, port);
    }
  };
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
}

function connect(fromNode, fromPort, toNode, toPort){
  if(fromNode===toNode) return;
  // each input takes a single link — drop any existing one
  graph.links = graph.links.filter(l=> !(l.to.node===toNode && l.to.port===toPort));
  graph.links.push({ id:"l"+(lid++), from:{node:fromNode, port:fromPort}, to:{node:toNode, port:toPort} });
  refreshImageInputs(byId(toNode)||{});   // wiring the empty slot grows the next one
  redraw(); refreshPortFills(); save();
}

/* ======================================================================
   QUICK ADD — drop a wire into empty space, pick a node, get it wired
   ----------------------------------------------------------------------
   The menu only lists nodes that actually fit the dragged port: dragging
   FROM an output shows nodes that *consume* that type; dragging FROM an
   input shows nodes that *produce* it. The chosen node is created at the
   drop point and auto-connected to its first matching free socket.
   ====================================================================== */
const nodeProducesType = (k, type)=> (NODE_TYPES[k].outputs||[]).some(o=> o.type===type);
// Does a node accept this type as input? Static input ports, the LLM's dynamic image ports,
// and — for text — any wirable text field (every textarea gets an inline text port via addFieldPorts).
function nodeAcceptsType(k, type){
  const t = NODE_TYPES[k];
  if((t.inputs||[]).some(p=> p.type===type)) return true;
  if(type==="image" && t.imageInputs) return true;
  if(type==="text"  && bodyHasTextField(k)) return true;
  return false;
}
const _qaTextField = {};   // memoised: which node types render a wirable text field
function bodyHasTextField(k){
  if(k in _qaTextField) return _qaTextField[k];
  let has = false;
  if(k!=="text"){            // Text is a pure source — its textarea is the value, not a wirable override
    try{ has = /<textarea\b[^>]*\bdata-(?:f|pf)\s*=\s*"(?!extraJson")/i.test(NODE_TYPES[k].body({ type:k, fields:{} })); }
    catch{ has = false; }
  }
  return (_qaTextField[k] = has);
}
function quickAddCandidates(dir, type){
  const fits = dir==="out" ? (k)=> nodeAcceptsType(k, type) : (k)=> nodeProducesType(k, type);
  return Object.entries(NODE_TYPES).filter(([k])=> fits(k));
}

function openQuickAdd(clientX, clientY, originPort){
  closeQuickAdd();
  const dir = originPort.dataset.dir, type = originPort.dataset.ptype;
  const cands = quickAddCandidates(dir, type);
  if(!cands.length) return;
  const pop = $("quickadd");
  // group the candidates the same way the main Add menu does
  const groups = new Map(ADD_GROUPS.map(g=>[g,[]]));
  for(const [k,t] of cands){ const g = t.group||"Other"; if(!groups.has(g)) groups.set(g,[]); groups.get(g).push([k,t]); }
  let html = `<div class="qhint">${dir==="out" ? "→ send "+esc(type)+" to…" : "← get "+esc(type)+" from…"}</div>`;
  for(const [g,items] of groups){
    if(!items.length) continue;
    html += `<div class="grp">${esc(g)}</div>`;
    html += items.map(([k,t])=>
      `<button data-type="${k}"><span class="k">${t.em}</span><span><div>${esc(t.title)}</div><div class="d">${esc(t.desc)}</div></span></button>`).join("");
  }
  pop.innerHTML = html;
  // world coords for the new node, derived from the drop point (#world is translated by pan and scaled)
  const ed = editor.getBoundingClientRect();
  const wx = (clientX - ed.left - panX)/scale, wy = (clientY - ed.top - panY)/scale;
  pop.querySelectorAll("button").forEach(b=> b.onclick = ()=>{ quickSpawn(b.dataset.type, wx, wy, dir, type, originPort); closeQuickAdd(); });
  // show, then clamp to the viewport
  pop.classList.add("open");
  const pr = pop.getBoundingClientRect();
  let px = clientX + 6, py = clientY + 6;
  if(px + pr.width  > innerWidth  - 8) px = Math.max(8, clientX - pr.width - 6);
  if(py + pr.height > innerHeight - 8) py = Math.max(8, innerHeight - pr.height - 8);
  pop.style.left = px+"px"; pop.style.top = py+"px";
  // close on the next outside interaction (deferred so this drag's own pointerup doesn't immediately close it)
  setTimeout(()=> document.addEventListener("pointerdown", quickAddOutside), 0);
}
function quickAddOutside(e){ if(!$("quickadd").contains(e.target)) closeQuickAdd(); }
function closeQuickAdd(){
  const pop = $("quickadd"); if(!pop || !pop.classList.contains("open")) return;
  pop.classList.remove("open"); pop.innerHTML = "";
  document.removeEventListener("pointerdown", quickAddOutside);
}
// A chat node's image socket is gated on a vision-capable model. When the quick-add lands an
// image on an LLM whose default model can't see images, the socket renders disabled — so swap in
// a model that supports the input, otherwise the promised auto-wire would have nothing to land on.
function ensureModelForInput(n, type){
  const t = NODE_TYPES[n.type];
  if(type==="image" && t.imageInputs && t.modelKind){
    const m = (catalogs[t.modelKind]||[]).find(x=> passesFilter(x, t.imageInputs));
    if(m){
      n.fields.model = m.id;
      const mp = n.el.querySelector(".modelpick"); if(mp) mp.textContent = m.id + " ▾";
      updateNodePrice(n); refreshImageInputs(n); save();
    }
  }
}
function quickSpawn(typeKey, wx, wy, dir, type, originPort){
  // place the card so its relevant edge sits near the drop point (downstream to the right, source to the left)
  const x = dir==="out" ? wx + 8 : wx - 232;
  const n = addNode(typeKey, Math.round(x), Math.round(wy - 24));
  select(n);
  const opp = dir==="out" ? "in" : "out", sel = `.port[data-dir="${opp}"][data-ptype="${type}"]`;
  let ports = [...n.el.querySelectorAll(sel)];
  // the only matching socket may be disabled (e.g. an LLM defaulted to a non-vision model) — upgrade
  // the model so the wire can actually land, then re-read the now-enabled ports
  if(dir==="out" && ports.length && !ports.some(p=> !p.classList.contains("disabled"))){
    ensureModelForInput(n, type);
    ports = [...n.el.querySelectorAll(sel)];
  }
  ports = ports.filter(p=> !p.classList.contains("disabled"));
  // wire the dragged port to the new node's first matching, free socket
  const target = ports.find(p=> p.dataset.port==="prompt") || ports.find(p=> !p.classList.contains("filled")) || ports[0];
  redraw();
  if(target){
    const out = dir==="out" ? originPort : target, inn = dir==="out" ? target : originPort;
    connect(out.dataset.node, out.dataset.port, inn.dataset.node, inn.dataset.port);
  }
}

// pan (one finger / drag) + pinch-zoom (two fingers) on the editor background.
// One unified pointer tracker handles mouse and multi-touch alike, so a phone can
// drag the canvas with a finger and pinch to zoom — the wheel handler below covers desktop.
const ZMIN=0.4, ZMAX=1.8;
const ptrs = new Map();           // pointers that began on empty canvas: id -> {x,y}
let gest = null;                  // {mode:"pan",sx,sy,px,py} | {mode:"pinch",d0,s0,wx,wy}
const onBg = (t)=> t===editor || t===world || t===svg;   // nodes/ports run their own handlers
const edPt = (cx,cy)=>{ const r=editor.getBoundingClientRect(); return {x:cx-r.left, y:cy-r.top}; };
function seedPinch(){              // anchor the world-point under the two-finger midpoint
  const p=[...ptrs.values()].slice(0,2);
  const mid=edPt((p[0].x+p[1].x)/2,(p[0].y+p[1].y)/2);
  gest={ mode:"pinch", d0:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y)||1, s0:scale,
         wx:(mid.x-panX)/scale, wy:(mid.y-panY)/scale };
}
editor.addEventListener("pointerdown", e=>{
  if(!onBg(e.target)) return;
  try{ editor.setPointerCapture?.(e.pointerId); }catch{}   // capture is best-effort — never let it abort the gesture
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(ptrs.size===1){
    select(null);
    gest={ mode:"pan", sx:e.clientX, sy:e.clientY, px:panX, py:panY };
    editor.classList.add("panning");
  } else if(ptrs.size===2){
    editor.classList.remove("panning"); seedPinch();
  }
});
editor.addEventListener("pointermove", e=>{
  if(!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(gest?.mode==="pan" && ptrs.size===1){
    panX = gest.px + (e.clientX-gest.sx);
    panY = gest.py + (e.clientY-gest.sy);
    applyWorld(); redraw();
  } else if(gest?.mode==="pinch" && ptrs.size>=2){
    const p=[...ptrs.values()].slice(0,2);
    const mid=edPt((p[0].x+p[1].x)/2,(p[0].y+p[1].y)/2);
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    scale = clamp(gest.s0 * (d/gest.d0), ZMIN, ZMAX);
    panX = mid.x - gest.wx*scale;     // keep that focal world-point pinned under the fingers
    panY = mid.y - gest.wy*scale;
    applyWorld(); redraw();
  }
});
function endPtr(e){
  if(!ptrs.has(e.pointerId)) return;
  ptrs.delete(e.pointerId);
  if(ptrs.size>=2){ seedPinch(); }
  else if(ptrs.size===1){           // pinch → single finger: resume panning without a jump
    const [p]=[...ptrs.values()];
    gest={ mode:"pan", sx:p.x, sy:p.y, px:panX, py:panY };
  } else { gest=null; editor.classList.remove("panning"); }
}
editor.addEventListener("pointerup", endPtr);
editor.addEventListener("pointercancel", endPtr);
editor.addEventListener("wheel", e=>{
  e.preventDefault();
  const rect=editor.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const wx=(mx-panX)/scale, wy=(my-panY)/scale;
  scale = clamp(scale * (e.deltaY<0 ? 1.1 : 1/1.1), 0.4, 1.8);
  panX = mx - wx*scale; panY = my - wy*scale;
  applyWorld(); redraw();
}, {passive:false});

// delete selected node with keyboard (when not typing)
window.addEventListener("keydown", e=>{
  if((e.ctrlKey||e.metaKey) && e.key==="Enter"){ e.preventDefault(); runAll(); return; }   // run every flow
  if((e.key==="Delete"||e.key==="Backspace") && selected && !/^(TEXTAREA|INPUT|SELECT)$/.test(document.activeElement.tagName)){
    removeNode(selected.id);
  }
});
window.addEventListener("resize", redraw);

/* ======================================================================
   EXECUTION  (topological evaluation)
   ====================================================================== */
const stats = { count:0, cost:0, exact:true, balance:null };
function paintCost(){
  if(stats.balance==null){ $("cost").textContent=""; return; }   // show only the running balance
  $("cost").innerHTML = `bal $<b>${stats.balance.toFixed(2)}</b>`;
}

function ancestors(targets){
  const keep = new Set(targets);
  const stack = [...targets];
  while(stack.length){
    const n = stack.pop();
    for(const l of graph.links) if(l.to.node===n && !keep.has(l.from.node)){ keep.add(l.from.node); stack.push(l.from.node); }
  }
  return keep;
}
function topoOrder(ids){
  const indeg={}, adj={};
  ids.forEach(id=>{ indeg[id]=0; adj[id]=[]; });
  for(const l of graph.links) if(ids.has(l.from.node) && ids.has(l.to.node)){ adj[l.from.node].push(l.to.node); indeg[l.to.node]++; }
  const q=[...ids].filter(id=>indeg[id]===0), order=[];
  while(q.length){ const n=q.shift(); order.push(n); for(const m of adj[n]) if(--indeg[m]===0) q.push(m); }
  return { order, cyclic:[...ids].filter(id=>!order.includes(id)) };
}

// the connected component (links treated as undirected) containing a node — i.e. its "group"
function componentOf(id){
  const seen = new Set([id]), stack = [id];
  while(stack.length){
    const n = stack.pop();
    for(const l of graph.links){
      if(l.from.node===n && !seen.has(l.to.node)){ seen.add(l.to.node); stack.push(l.to.node); }
      if(l.to.node===n && !seen.has(l.from.node)){ seen.add(l.from.node); stack.push(l.from.node); }
    }
  }
  return seen;
}
function components(){
  const seen = new Set(), out = [];
  for(const n of graph.nodes){ if(seen.has(n.id)) continue; const c = componentOf(n.id); c.forEach(x=>seen.add(x)); out.push(c); }
  return out;
}

const runningNodes = new Set();   // nodes whose group is currently executing — play is disabled for these
function groupBusy(ids){ for(const id of ids) if(runningNodes.has(id)) return true; return false; }
function updateRunButtons(){
  for(const n of graph.nodes){ const b = n.el?.querySelector("[data-act=run]"); if(b) b.disabled = runningNodes.has(n.id); }
  const idle = graph.nodes.some(n=> !runningNodes.has(n.id));
  $("run").disabled = graph.nodes.length>0 && !idle;
}

// Run one group: lock its whole connected component, execute the ancestors of `seedIds` in topo order.
// Multiple groups run concurrently because callers don't await each other.
async function runGroup(seedIds){
  if(!ensureAuth()) return;
  const lock = new Set();
  for(const id of seedIds) for(const x of componentOf(id)) lock.add(x);
  if(!lock.size || groupBusy(lock)) return;         // empty, or this group is already running
  const ids = ancestors(seedIds);                    // what we actually compute (seed + upstream)
  lock.forEach(id=>runningNodes.add(id)); updateRunButtons();
  try{
    const { order, cyclic } = topoOrder(ids);
    cyclic.forEach(id=> setStatus(byId(id), "error", "cycle detected"));
    ids.forEach(id=>{ if(order.includes(id) && byId(id)?.el) byId(id).el.dataset.status="idle"; });
    // Each node fires as soon as its OWN inputs resolve, so sibling branches
    // (a→b, a→c) run concurrently rather than serializing down the topo order.
    const done = {};                                  // id → promise, so dependents await just their inputs
    const depsOf = (id)=>{                             // upstream node ids feeding this node (within the run set)
      const s = new Set();
      for(const l of graph.links) if(l.to.node===id && ids.has(l.from.node)) s.add(l.from.node);
      return [...s];
    };
    for(const id of order){                            // topo order → every dep's promise exists before we read it
      const deps = depsOf(id);
      done[id] = (async ()=>{
        await Promise.all(deps.map(d=> done[d]));       // wait on this node's inputs only
        const n = byId(id); if(!n) return;
        const t = NODE_TYPES[n.type], inp = {};
        for(const port of t.inputs){
          const l = graph.links.find(x=> x.to.node===id && x.to.port===port.name);
          if(l) inp[port.name] = byId(l.from.node)?.out?.[l.from.port];
        }
        // dynamic image ports (img1, img2, …) on vision-capable nodes → collected by run() via collectImageInputs()
        if(t.imageInputs) for(const l of graph.links){
          if(l.to.node===id && IMG_PORT_RE.test(l.to.port)) inp[l.to.port] = byId(l.from.node)?.out?.[l.from.port];
        }
        // a wired text field overrides its typed value (n.fields[field]); declared ports handled above
        const fieldOverrides = {};
        for(const l of graph.links){
          if(l.to.node!==id || t.inputs.some(p=>p.name===l.to.port)) continue;
          if(t.imageInputs && IMG_PORT_RE.test(l.to.port)) continue;   // image ports aren't text-field overrides
          const v = byId(l.from.node)?.out?.[l.from.port];
          if(v!=null) fieldOverrides[l.to.port] = v;
        }
        const rn = Object.keys(fieldOverrides).length ? { ...n, fields:{...n.fields, ...fieldOverrides} } : n;
        setStatus(n, "run");
        try{ n.out = await t.run(rn, inp, CTX) || {}; showResult(n); setStatus(n, "done"); }
        catch(err){ setStatus(n, "error", err.message); }
      })();
    }
    await Promise.all(order.map(id=> done[id]));
  } finally {
    lock.forEach(id=>runningNodes.delete(id)); updateRunButtons();
  }
}
// Run every idle group at once (busy ones keep going untouched).
function runAll(){
  if(!ensureAuth()) return;
  if(!graph.nodes.length){ flash("nothing to run — add a node"); return; }
  for(const c of components()) if(!groupBusy(c)) runGroup([...c]);   // fire-and-forget → groups run in parallel
}

/* ---------- NanoGPT calls (browser → NanoGPT directly) ---------- */
const CTX = {
  async genImage(prompt, model, size, imageDataUrl){
    const body = { model, prompt, size, n:1, response_format:"b64_json" };
    if(imageDataUrl) body.imageDataUrl = imageDataUrl;   // present → image edit (img2img)
    const r = await fetch(IMG_ENDPOINT, {method:"POST", headers:authHeaders(), body:JSON.stringify(body)});
    if(!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,160)}`);
    const j = await r.json();
    const d = (j.data||[])[0]||{};
    const url = d.b64_json ? `data:image/png;base64,${d.b64_json}` : d.url;
    if(!url) throw new Error("no image in response");
    accrue(j); return url;
  },
  async genChat(messages, model){
    const r = await fetch(CHAT_ENDPOINT, {method:"POST", headers:authHeaders(),
      body:JSON.stringify({ model, messages, temperature:0.8 })});
    if(!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,160)}`);
    const j = await r.json();
    accrue(j);
    const txt = j.choices?.[0]?.message?.content;
    if(txt==null) throw new Error("no text in response");
    return typeof txt==="string" ? txt : txt.map(p=>p.text||"").join("");
  },
  // async video: submit → poll /api/video/status until COMPLETED (up to 5 min)
  // opts also carries optional source media for editing models: videoUrl/videoDataUrl
  // (extend/edit/upscale) and audioDataUrl (lipsync/avatar). duration/aspect only sent when set.
  async genVideo(model, prompt, opts, imageDataUrl, onProgress){
    const body = { model, prompt };
    if(opts.duration) body.duration = opts.duration;
    if(opts.aspect_ratio) body.aspect_ratio = opts.aspect_ratio;
    if(imageDataUrl) body.imageDataUrl = imageDataUrl;
    if(opts.videoUrl) body.videoUrl = opts.videoUrl;
    if(opts.videoDataUrl) body.videoDataUrl = opts.videoDataUrl;
    if(opts.audioDataUrl) body.audioDataUrl = opts.audioDataUrl;
    // NanoGPT inlines media as base64 and the edge (Vercel) rejects bodies over ~4.5 MB with a
    // header-less 413 that the browser mislabels as a CORS error. There's no upload endpoint, so
    // catch oversize locally and explain it. Video chained from another node rides as a remote
    // videoUrl (not inlined), so this mainly bites large audio (full songs) on the lipsync node.
    const payload = JSON.stringify(body);
    if(payload.length > MEDIA_INLINE_MAX)
      throw new Error("This audio/video is a bit large (~4 MB max). nanoodle sends media inline rather than uploading it (no S3 here), so NanoGPT's edge won't accept it. A shorter clip works well — or build this flow into an app (✨ Create app) and run it offline.");
    let r;
    try{ r = await fetch(`${NANOGPT}/api/generate-video`, {method:"POST", headers:authHeaders(), body:payload}); }
    catch(e){ throw new Error(`couldn't reach the video API — if the source media is large it may have been rejected for size before CORS applies. Try a shorter clip, or build this into an app and run it offline. (${e.message||e})`); }
    if(!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,160)}`);
    const j = await r.json(); accrue(j);
    const runId = j.runId || j.id;
    if(!runId) throw new Error("no runId returned");
    const t0 = Date.now();
    while(Date.now()-t0 < 300000){
      await sleep(5000);
      let s; try{ s = await (await fetch(`${NANOGPT}/api/video/status?requestId=${encodeURIComponent(runId)}`, {headers:authHeaders()})).json(); }
      catch{ continue; }
      const st = String(s.data?.status || s.status || "").toUpperCase();
      onProgress && onProgress(st, Date.now()-t0);
      if(st==="COMPLETED" || st==="SUCCEEDED"){
        const out = s.data?.output || s.output || {};
        const url = out.video?.url || out.url || (Array.isArray(out.video) ? out.video[0]?.url : null);
        if(!url) throw new Error("completed but no video url");
        return url;
      }
      if(["FAILED","ERROR","CANCELED"].includes(st)) throw new Error("video failed: " + (s.data?.error || st));
    }
    throw new Error("video timed out (5 min)");
  },
  // sync audio (speech OR music): /api/v1/audio/speech → binary audio (or JSON with a url for some providers).
  // extra = the dynamic, model-specific params already resolved by the node (lyrics, voice, duration, …).
  async genAudio(model, input, extra, onProgress){
    const body = Object.assign({ model, input }, extra||{});
    const r = await fetch(`${NANOGPT}/api/v1/audio/speech`, {method:"POST", headers:authHeaders(), body:JSON.stringify(body)});
    if(!r.ok){
      const t = (await r.text()).slice(0,220);
      if(/lyric/i.test(t)) throw new Error("This model needs lyrics — fill the Lyrics field (vocal models require them; leave empty / use a BGM model for instrumentals).");
      const req = t.match(/["']?([a-z_]+)["']?\s+(?:is\s+)?required|missing[^a-z]+["']?([a-z_]+)/i);
      const field = req && (req[1]||req[2]);
      if(field) throw new Error(`This model requires "${field}" — set it in the node, or add it under advanced params.`);
      throw new Error(`${r.status}: ${t}`);
    }
    const ct = r.headers.get("content-type") || "";
    if(ct.includes("application/json")){
      const j = await r.json(); accrue(j);
      let url = j.url || j.audioUrl || j.data?.url || j.data?.audioUrl;
      if(!url && (j.runId || j.id)) url = await pollAudio(model, j, onProgress);   // async model → poll
      if(!url) throw new Error("no audio url in response");
      return url;
    }
    const blob = await r.blob();
    const hc = parseFloat(r.headers.get("x-cost") || r.headers.get("x-nano-cost") || "");
    stats.count++; if(!isNaN(hc)) stats.cost += hc; else stats.exact = false;   // x-cost 0 = known-free (subscription)
    const bal = parseFloat(r.headers.get("x-remaining-balance") || ""); if(!isNaN(bal)) stats.balance = bal;
    paintCost();
    return URL.createObjectURL(blob);
  },
  // speech→text: multipart upload to /api/v1/audio/transcriptions (audio file + model + language).
  // The in-graph audio is a blob/data URL, so we re-fetch its bytes and post them as a file.
  async transcribe(model, audioUrl, language){
    const blob = await (await fetch(audioUrl)).blob();
    if(blob.size > 3.5*1024*1024)
      throw new Error("This clip is a bit big to transcribe directly (~3 MB max) — nanoodle sends audio inline rather than uploading it (no S3 here). A shorter clip works, or build this into an app (✨ Create app) and run it offline.");
    const ext = (blob.type.split("/")[1] || "mp3").split(";")[0];
    const fd = new FormData();
    fd.append("audio", blob, `audio.${ext}`);
    fd.append("model", model);
    if(language) fd.append("language", language);
    const k = getKey();   // multipart: let the browser set Content-Type (boundary) — don't use authHeaders()
    const r = await fetch(`${NANOGPT}/api/v1/audio/transcriptions`, {method:"POST",
      headers:{ Authorization:`Bearer ${k}`, "x-api-key":k }, body:fd});
    if(!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,160)}`);
    const j = await r.json(); accrue(j);
    if(j?.metadata?.cost!=null && isFinite(+j.metadata.cost)) stats.cost += +j.metadata.cost;   // cost rides in metadata here
    const txt = j.transcription ?? j.text ?? j.data?.transcription ?? j.data?.text;
    if(txt==null) throw new Error("no transcription in response");
    return txt;
  }
};
// turn a blob:/data:/http url into a base64 data URL (for video/audio source payloads)
async function urlToDataUrl(url){
  if(/^data:/.test(url)) return url;
  const blob = await (await fetch(url)).blob();
  return await new Promise((res, rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=()=>rej(new Error("could not read media")); fr.readAsDataURL(blob); });
}
// source-video payload for /api/generate-video: pass a public https link as videoUrl, otherwise inline as videoDataUrl
async function videoSourceOpts(url){
  return /^https?:/.test(url) ? { videoUrl:url } : { videoDataUrl: await urlToDataUrl(url) };
}
const sleep = (ms)=> new Promise(res=> setTimeout(res, ms));
// async audio (music / some TTS): submit returns {status:"pending", runId} → poll /api/tts/status until completed
async function pollAudio(model, j, onProgress){
  const runId = j.runId || j.id;
  const qs = new URLSearchParams({ runId, model });
  if(j.cost!=null) qs.set("cost", j.cost);                 // these let the server auto-refund on failure
  if(j.paymentSource) qs.set("paymentSource", j.paymentSource);
  if(j.isApiRequest!=null) qs.set("isApiRequest", j.isApiRequest);
  const t0 = Date.now();
  while(Date.now()-t0 < 300000){
    await sleep(3000);
    let s; try{ s = await (await fetch(`${NANOGPT}/api/tts/status?${qs}`, {headers:authHeaders()})).json(); }
    catch{ continue; }
    const st = String(s.status||"").toLowerCase();
    if(st==="completed" || st==="succeeded")
      return s.audioUrl || s.url || s.data?.audioUrl || s.data?.url || (()=>{ throw new Error("completed but no audio url"); })();
    if(["error","failed","content_policy_violation"].includes(st)) throw new Error("audio failed: " + (s.error || s.message || st));
    onProgress && onProgress(s.queuePosition, Date.now()-t0);
  }
  throw new Error("audio timed out (5 min)");
}
function authHeaders(){ const k=getKey(); return { Authorization:`Bearer ${k}`, "x-api-key":k, "Content-Type":"application/json" }; }
function accrue(j){
  stats.count++;
  // images/video/audio price top-level (j.cost); chat completions ride it in
  // x_nanogpt_pricing (costUsd|cost) — without this, LLM calls never bump spend.
  // A present-but-ZERO price is known-free (subscription-included), NOT unknown —
  // keep it as 0 so the spend meter stays exact instead of flipping to "~".
  const p = j?.x_nanogpt_pricing, pUsd = p && (p.costUsd!=null ? p.costUsd : p.cost);
  const usd = (typeof j?.cost==="number" && j.cost>0) ? j.cost
            : (pUsd!=null && isFinite(Number(pUsd))) ? Number(pUsd)
            : (typeof j?.cost==="number") ? j.cost : null;
  if(usd!=null) stats.cost += usd; else stats.exact=false;
  if(typeof j?.remainingBalance==="number") stats.balance = j.remainingBalance;
  else if(p && typeof p.remainingBalance==="number") stats.balance = p.remainingBalance;
  paintCost();
}

}

function buildAddMenu(){
  const pop = $("addpop");
  const entries = Object.entries(NODE_TYPES);
  const groups = new Map(ADD_GROUPS.map(g=>[g,[]]));

  pop.querySelectorAll("button").forEach(b=> b.onclick=()=>{
    spawnCenter(b.dataset.type); pop.classList.remove("open");
  });
}
let spawnN = 0;

  const cx = (editor.clientWidth/2 - panX)/scale - 105 + (spawnN%4)*26;

  spawnN++;
  const n = addNode(type, Math.round(cx), Math.round(cy));
  select(n); redraw();
}

/* ======================================================================
   PERSISTENCE
   ====================================================================== */
function serializeGraph(){
  return {
    v:1,
    nodes: graph.nodes.map(n=>({id:n.id,type:n.type,x:n.x,y:n.y,fields:n.fields,w:n.w,sizes:n.sizes})),
    links: graph.links, nid, lid, view:{panX,panY,scale}
  };
}
// A graph for handing off to others: uploaded media inputs are the sharer's own
// data, so blank them out of share links and downloaded files. (Local autosave keeps them.)
const UPLOAD_FIELD = { upload:"image", aupload:"audio", vupload:"video" };
function shareableGraph(){
  const g = serializeGraph();
  g.nodes = g.nodes.map(n => UPLOAD_FIELD[n.type] ? {...n, fields:{...n.fields, [UPLOAD_FIELD[n.type]]:""}} : n);
  return g;
}
function applyGraphData(d){
  world.innerHTML=""; selected=null;
  graph = { nodes:[], links:[] };
  if(d.view){ panX=d.view.panX??panX; panY=d.view.panY??panY; scale=d.view.scale??scale; applyWorld(); }
  const ALIAS = { audio:"tts" };                  // older graphs had a single combined audio node
  for(const sn of (d.nodes||[])){
    const type = ALIAS[sn.type] || sn.type;
    if(!NODE_TYPES[type]) continue;               // skip unknown node types gracefully
    const n={ ...sn, type, out:{}, el:null }; graph.nodes.push(n); buildNodeEl(n);
  }
  // keep only links whose endpoints survived
  const ids = new Set(graph.nodes.map(n=>n.id));
  graph.links = (d.links||[]).filter(l=> ids.has(l.from?.node) && ids.has(l.to?.node));
  // migrate: music/tts main input moved from a header "text" port to the inline "prompt" field port
  for(const l of graph.links){
    const tn = byId(l.to.node);
    if(tn && (tn.type==="music"||tn.type==="tts") && l.to.port==="text") l.to.port="prompt";
  }
  // rebuild id counters so new nodes/links never collide with loaded ones
  const num = (s)=> parseInt(String(s).replace(/\D/g,""),10) || 0;
  nid = Math.max(d.nid||0, 0, ...graph.nodes.map(n=>num(n.id))) + 1;
  lid = Math.max(d.lid||0, 0, ...graph.links.map(l=>num(l.id))) + 1;
  graph.nodes.forEach(n=>{ recompactImageLinks(n); refreshImageInputs(n); });   // links loaded → compact + grow image ports
  redraw(); refreshPortFills(); refreshAllPrices();
}

/* ---------- shareable link: graph packed into the URL hash ---------- */
function bytesToB64url(bytes){
  let bin=""; const CH=0x8000;
  for(let i=0;i<bytes.length;i+=CH) bin += String.fromCharCode.apply(null, bytes.subarray(i,i+CH));
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function b64urlToBytes(s){
  s = s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="=";
  const bin=atob(s), out=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
  return out;
}
async function gzip(str){
  if(typeof CompressionStream==="undefined") return null;
  const stream = new Blob([new TextEncoder().encode(str)]).stream().pipeThrough(new CompressionStream("gzip"));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function gunzip(bytes){
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
  return new TextDecoder().decode(await new Response(stream).arrayBuffer());
}
async function copyText(t){
  try{ await navigator.clipboard.writeText(t); return true; }catch{}
  try{ const ta=document.createElement("textarea"); ta.value=t; ta.style.cssText="position:fixed;opacity:0";
       document.body.appendChild(ta); ta.select(); const ok=document.execCommand("copy"); ta.remove(); return ok; }catch{ return false; }
}
async function shareUrl(){
  const json = JSON.stringify(shareableGraph());
  let hash;
  const packed = await gzip(json).catch(()=>null);
  hash = packed ? "#g="+bytesToB64url(packed) : "#j="+bytesToB64url(new TextEncoder().encode(json));
  const url = location.origin + location.pathname + location.search + hash;
  history.replaceState({}, "", url);                 // surface it in the address bar too
  const big = url.length > 8000 ? ` (${(url.length/1024).toFixed(0)}kB)` : "";
  const ok = await copyText(url);
  toast(ok
    ? `✓ Share link copied! Paste it anywhere — it opens this exact workflow${big}`
    : `Share link is in the address bar — copy it to share this workflow${big}`, ok?"":"err");
  const b = $("share");                                   // flip the button itself for unmistakable feedback
  if(b && ok){ const o=b.textContent; b.textContent="✓ Link copied!"; b.classList.add("ok");
    setTimeout(()=>{ b.textContent=o; b.classList.remove("ok"); }, 1800); }
}
// Set when this editor session is editing the workflow of an existing app (carried in
// via #ga= or the modal's __editflow__ message). "Create app" hands the graph back under
// this id so the app updates in place instead of spawning a fresh default app.
let pendingAppId = null;
let pendingAppTitle = null;   // the loaded app's name, for the page title (carried alongside pendingAppId)
// "nanoodle - workflow" while noodling; "nanoodle - <app> app" once an app's workflow is loaded.
function updateTitle(){
  const t = (pendingAppTitle || "").trim();
  document.title = pendingAppId ? `nanoodle - ${t || "app"} app` : "nanoodle - workflow";
}
async function loadFromHash(){
  const h = location.hash; let json=null, ga=false;
  try{
    if(h.startsWith("#ga=")){ ga=true; const tag=h.slice(4);
      json = tag[0]==="u" ? new TextDecoder().decode(b64urlToBytes(tag.slice(1))) : await gunzip(b64urlToBytes(tag)); }
    else if(h.startsWith("#g=")) json = await gunzip(b64urlToBytes(h.slice(3)));
    else if(h.startsWith("#j=")) json = new TextDecoder().decode(b64urlToBytes(h.slice(3)));
  }catch{ /* bad link */ }
  if(!json) return false;
  try{
    if(ga){ const spec = JSON.parse(json); pendingAppId = spec.appId || null; pendingAppTitle = spec.title || null; applyGraphData(spec.graph); }
    else { pendingAppId = null; pendingAppTitle = null; applyGraphData(JSON.parse(json)); }
    updateTitle();
    history.replaceState({}, "", location.pathname + location.search); // consume the link; edits now win
    save();
    return true;
  }catch{ return false; }
}
$("share").onclick = ()=> shareUrl().catch(e=> flash("share failed: "+e.message));
// Turn this workflow into a standalone app (play.html). Hand off the graph via the
// existing #g= packing; stash a localStorage copy as a belt-and-suspenders fallback.
// Open the app builder as a popup over the editor (play.html in a modal iframe), so it
// feels cohesive instead of a separate tab. Same-origin → it shares the signed-in key.
function closeAppModal(){ $("appmodal").hidden = true; $("appmodalframe").src = "about:blank"; }
function openAppModal(hash){ $("appmodalframe").src = "play.html"+hash; $("appmodal").hidden = false; }
$("makeapp").onclick = async ()=>{
  if(!graph.nodes.length){ flash("add a node first"); return; }
  const graphData = serializeGraph();
  const json = JSON.stringify(graphData);
  try{ localStorage.setItem("noodle_app_handoff", json); }catch{}
  let hash;
  if(pendingAppId){   // editing an existing app's workflow → hand the graph back under its id
    const payload = JSON.stringify({ v:1, graph:graphData, appId:pendingAppId });
    const packed = await gzip(payload).catch(()=>null);
    hash = packed ? "#ga="+bytesToB64url(packed) : "#ga=u"+bytesToB64url(new TextEncoder().encode(payload));
  }else{
    const packed = await gzip(json).catch(()=>null);
    hash = packed ? "#g="+bytesToB64url(packed) : "#j="+bytesToB64url(new TextEncoder().encode(json));
  }
  openAppModal(hash);
};
$("appmodalclose").onclick = closeAppModal;
$("appmodal").addEventListener("click", e=>{ if(e.target.id==="appmodal") closeAppModal(); });   // click the dim backdrop
addEventListener("keydown", e=>{ if(e.key==="Escape" && !$("appmodal").hidden) closeAppModal(); });
addEventListener("message", e=>{
  if(e.source!==$("appmodalframe").contentWindow || !e.data) return;
  if(e.data.type==="__closeapp__") closeAppModal();
  // builder asked to edit the workflow: load that app's graph onto the canvas, remember
  // its id so the next "Create app" updates it, and drop back to the editor.
  else if(e.data.type==="__editflow__"){
    pendingAppId = e.data.appId || null;
    pendingAppTitle = e.data.title || null;
    updateTitle();
    if(e.data.graph){ try{ applyGraphData(e.data.graph); save(); }catch(_){ /* keep current canvas */ } }
    closeAppModal();
  }
});
function seed(){
  const a = addNode("text", 60, 80, { text:"a cozy ramen shop on a rainy neon street, cinematic" });
  const b = addNode("image", 360, 60);
  connect(a.id, "text", b.id, "prompt");
}

/* ======================================================================
   AUTH  (OAuth PKCE + paste key — identical pattern to the other examples)
   ====================================================================== */
const getKey = ()=> localStorage.getItem("ngpt_key");
const setKey = (k)=>{ k ? localStorage.setItem("ngpt_key",k) : localStorage.removeItem("ngpt_key"); renderAuth(); };
function renderAuth(){
  const ok = !!getKey();
  $("status").textContent = ok ? "ready ✓" : "not signed in";
  $("signin").style.display = ok?"none":""; $("pastebtn").style.display = ok?"none":""; $("signout").style.display = ok?"":"none";
}
const REDIRECT_URI = location.origin + location.pathname;
if (location.hostname === "127.0.0.1") location.hostname = "localhost";
const b64url = (b)=>btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
const rand = (n)=>b64url(crypto.getRandomValues(new Uint8Array(n)));
const sha256url = async (s)=>b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s)));
async function clientId(){
  const cached = JSON.parse(localStorage.getItem("ngpt_client")||"null");
  if (cached && cached.redirect===REDIRECT_URI) return cached.id;
  const r = await fetch(`${NANOGPT}/oauth/register`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({client_name:"Noodle",redirect_uris:[REDIRECT_URI],grant_types:["authorization_code"],response_types:["code"],token_endpoint_auth_method:"none"})});
  if(!r.ok) throw new Error("register "+r.status);
  const id=(await r.json()).client_id;
  localStorage.setItem("ngpt_client",JSON.stringify({id,redirect:REDIRECT_URI}));
  return id;
}
async function signIn(){
  const id = await clientId();
  const verifier=rand(32), state=rand(16);
  sessionStorage.setItem("pkce",JSON.stringify({verifier,state,id}));
  const u=new URL(`${NANOGPT}/oauth/authorize`);
  u.search=new URLSearchParams({response_type:"code",client_id:id,redirect_uri:REDIRECT_URI,scope:"api.use models.read",state,code_challenge:await sha256url(verifier),code_challenge_method:"S256",invitation_code:"W3x83yU3"}).toString();
  // Stash the graph before the full-page redirect (the #g=/#j= hash never survives OAuth,
  // and a debounced autosave may not have fired yet). sessionStorage survives same-tab nav.
  try{ if(graph.nodes && graph.nodes.length) sessionStorage.setItem(RESUME_KEY, JSON.stringify(serializeGraph())); }catch(_){}
  try{ if(pendingAppId) sessionStorage.setItem(RESUME_APPID_KEY, pendingAppId); else sessionStorage.removeItem(RESUME_APPID_KEY); }catch(_){}
  try{ if(pendingAppId && pendingAppTitle) sessionStorage.setItem(RESUME_APPTITLE_KEY, pendingAppTitle); else sessionStorage.removeItem(RESUME_APPTITLE_KEY); }catch(_){}
  location.assign(u.toString());
}
async function handleRedirect(){
  const p=new URLSearchParams(location.search);
  if(!p.has("code")&&!p.has("error")) return;
  history.replaceState({},"",REDIRECT_URI);
  const saved=JSON.parse(sessionStorage.getItem("pkce")||"null"); sessionStorage.removeItem("pkce");
  if(p.get("error")) throw new Error(p.get("error"));
  if(!saved||p.get("state")!==saved.state) throw new Error("state mismatch");
  const r=await fetch(`${NANOGPT}/oauth/token`,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams({grant_type:"authorization_code",client_id:saved.id,redirect_uri:REDIRECT_URI,code:p.get("code"),code_verifier:saved.verifier})});
  if(!r.ok) throw new Error("token: "+(await r.text()));
  setKey((await r.json()).access_token);
}
// Run while signed out kicks off the same sign-in the bar button uses, instead of just nagging.
function ensureAuth(){
  if(getKey()) return true;
  if(/^https?:$/.test(location.protocol)) signIn().catch(e=> $("status").textContent="sign-in error: "+e.message);
  else { $("keyrow").classList.add("open"); $("keyinput").focus(); flash("paste a nano-gpt.com API key to run"); }
  return false;
}
$("signin").onclick = ()=> signIn().catch(e=> $("status").textContent="sign-in error: "+e.message);
$("pastebtn").onclick = ()=>{ $("keyrow").classList.add("open"); $("keyinput").focus(); };
$("keysave").onclick = ()=>{ const k=$("keyinput").value.trim(); if(k){ setKey(k); $("keyrow").classList.remove("open"); } };
$("signout").onclick = ()=> setKey(null);

/* ======================================================================
   BOOT
   ====================================================================== */
(async ()=>{
  buildAddMenu();
  topOrder = [...$("top").childNodes];   // snapshot before any responsive relocation
  layoutBar();
  applyWorld();
  let restored = false;
  // came back from an OAuth redirect: restore the graph we stashed just before it (consumed once)
  try{ const rs = sessionStorage.getItem(RESUME_KEY); if(rs){ sessionStorage.removeItem(RESUME_KEY); applyGraphData(JSON.parse(rs)); save(); restored = true;
        const ra = sessionStorage.getItem(RESUME_APPID_KEY); if(ra){ pendingAppId = ra; pendingAppTitle = sessionStorage.getItem(RESUME_APPTITLE_KEY) || null; }   // keep the edit-workflow link across login
      } }catch(_){}
  try{ sessionStorage.removeItem(RESUME_APPID_KEY); sessionStorage.removeItem(RESUME_APPTITLE_KEY); }catch(_){}
  if(!restored && location.hash.length > 3) restored = await loadFromHash();   // opened a shared link
  if(!restored) restored = load();                                // else last local graph
  if(!restored) restored = await loadDefault();                   // else noodle-graph.json
  if(!restored) seed();                                           // else built-in starter
  updateTitle();                                                  // reflect whether an app's workflow is loaded
  redraw();
  try{ await handleRedirect(); }catch(e){ $("status").textContent="sign-in error: "+e.message; }
  renderAuth();
  // pull the full model catalogs in the background, then show per-node prices
  Promise.all([loadCatalog("chat"), loadCatalog("image"), loadCatalog("video"), loadCatalog("audio")]).then(refreshAllPrices);
})();
</script>
